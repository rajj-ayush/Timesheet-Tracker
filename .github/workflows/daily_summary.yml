name: Daily Timesheet Summarizer

on:
  # Runs automatically at 12:00 AM IST (which is 18:30 UTC)
  schedule:
    - cron: '30 18 * * *'
  
  # Allows you to trigger it manually from the GitHub website
  workflow_dispatch:

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary python-dotenv google-genai

      - name: Run Master Summarizer
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python auto_summarize.py